<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>比價大師 Mobile</title>
    <style>
        :root {
            --primary: #4f46e5;
            --success: #10b981;
            --danger: #f43f5e;
            --bg: #f8fafc;
            --card: #ffffff;
            --text-main: #1e293b;
            --text-sub: #64748b;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0f172a;
                --card: #1e293b;
                --text-main: #f1f5f9;
                --text-sub: #94a3b8;
            }
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 16px;
            padding-bottom: 100px; /* 為底部按鈕留空間 */
            line-height: 1.5;
            -webkit-tap-highlight-color: transparent;
        }

        /* 頂部標題 */
        .header {
            margin-bottom: 20px;
            text-align: center;
        }

        .header h1 {
            font-size: 24px;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        /* 卡片設計 */
        .card {
            background: var(--card);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -2px rgba(0, 0, 0, 0.1);
            margin-bottom: 16px;
        }

        .input-label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-sub);
            margin-bottom: 6px;
            display: block;
        }

        .input-field {
            width: 100%;
            background: var(--bg);
            border: 1px solid transparent;
            border-radius: 12px;
            padding: 12px 16px;
            font-size: 16px; /* 防止 iOS 自動放大 */
            color: var(--text-main);
            box-sizing: border-box;
            margin-bottom: 12px;
            transition: border-color 0.2s;
        }

        .input-field:focus {
            outline: none;
            border-color: var(--primary);
        }

        .row {
            display: flex;
            gap: 12px;
        }

        /* 按鈕風格 */
        .btn {
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 700;
            padding: 16px;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn:active {
            transform: scale(0.96);
            opacity: 0.9;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            width: 100%;
        }

        .btn-clear {
            background: transparent;
            color: var(--danger);
            font-size: 14px;
            margin-top: 10px;
            width: 100%;
        }

        /* 歷史預覽列表 */
        .section-title {
            font-size: 18px;
            font-weight: 700;
            margin: 24px 0 12px 4px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .history-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        .history-card:last-child { border-bottom: none; }

        .item-info strong { font-size: 16px; display: block; }
        .item-info span { font-size: 12px; color: var(--text-sub); }

        .price-info { text-align: right; }
        .unit-price {
            font-size: 20px;
            font-weight: 800;
            color: var(--primary);
            display: block;
        }

        .best-badge {
            background: var(--success);
            color: white;
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 6px;
            margin-top: 4px;
            display: inline-block;
        }

        .best-card {
            background: rgba(16, 185, 129, 0.08);
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        .delete-btn {
            color: var(--danger);
            padding: 8px;
            margin-left: 8px;
            font-size: 18px;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>🛒 比價大師 Mobile</h1>
    </div>

    <div class="container">
        <!-- 輸入區 -->
        <div class="card">
            <div class="row">
                <div style="flex: 1;">
                    <label class="input-label">品項 (如：鮮奶)</label>
                    <input type="text" id="category" class="input-field" placeholder="分類">
                </div>
                <div style="flex: 1;">
                    <label class="input-label">品牌/備註</label>
                    <input type="text" id="brand" class="input-field" placeholder="備註">
                </div>
            </div>

            <label class="input-label">規格內容</label>
            <div class="row">
                <input type="number" id="spec" class="input-field" style="flex: 1.5;" placeholder="數值" inputmode="decimal">
                <select id="unit" class="input-field" style="flex: 1;">
                    <optgroup label="重量/容量">
                        <option value="1">g</option>
                        <option value="1000">kg</option>
                        <option value="1">ml</option>
                        <option value="1000">L</option>
                    </optgroup>
                    <optgroup label="數量">
                        <option value="1">入</option>
                        <option value="1">個</option>
                        <option value="1">包</option>
                    </optgroup>
                </select>
            </div>

            <label class="input-label">總價格 ($)</label>
            <input type="number" id="price" class="input-field" placeholder="請輸入總金額" inputmode="numeric">

            <button class="btn btn-primary" onclick="addItem()">✨ 加入比價清單</button>
        </div>

        <!-- 歷史顯示區 -->
        <div id="historyContainer"></div>

        <button class="btn btn-clear" onclick="clearHistory()">🗑️ 清空所有歷史紀錄</button>
    </div>

    <script>
        let historyData = JSON.parse(localStorage.getItem('compareMobileV1')) || [];

        function addItem() {
            const cat = document.getElementById('category').value || "未分類";
            const brand = document.getElementById('brand').value || "預設";
            const spec = parseFloat(document.getElementById('spec').value);
            const multiplier = parseFloat(document.getElementById('unit').value);
            const unitName = document.getElementById('unit').options[document.getElementById('unit').selectedIndex].text;
            const price = parseFloat(document.getElementById('price').value);

            if (isNaN(spec) || isNaN(price)) {
                alert("請輸入規格與價格！");
                return;
            }

            const unitPrice = (price / (spec * multiplier)).toFixed(3);
            
            historyData.push({
                id: Date.now(),
                cat, brand, spec, unitName, price,
                unitPrice: parseFloat(unitPrice)
            });

            saveAndRender();
            
            // 手機端重置：保留分類，清空細項
            document.getElementById('brand').value = '';
            document.getElementById('spec').value = '';
            document.getElementById('price').value = '';
        }

        function saveAndRender() {
            localStorage.setItem('compareMobileV1', JSON.stringify(historyData));
            const container = document.getElementById('historyContainer');
            container.innerHTML = '';

            const groups = historyData.reduce((acc, obj) => {
                const key = obj.cat;
                if (!acc[key]) acc[key] = [];
                acc[key].push(obj);
                return acc;
            }, {});

            for (const cat in groups) {
                const section = document.createElement('div');
                section.innerHTML = `<div class="section-title">📂 ${cat}</div>`;
                
                const card = document.createElement('div');
                card.className = 'card';
                card.style.padding = '0'; // 內部列表用
                
                const minPrice = Math.min(...groups[cat].map(i => i.unitPrice));

                groups[cat].sort((a, b) => a.unitPrice - b.unitPrice).forEach(item => {
                    const isBest = item.unitPrice === minPrice;
                    const itemEl = document.createElement('div');
                    itemEl.className = `history-card ${isBest ? 'best-card' : ''}`;
                    itemEl.innerHTML = `
                        <div class="item-info">
                            <strong>${item.brand}</strong>
                            <span>${item.spec}${item.unitName} / 總價 $${item.price}</span>
                            ${isBest ? '<div class="best-badge">👑 最划算</div>' : ''}
                        </div>
                        <div class="price-info">
                            <span class="unit-price">$${item.unitPrice}</span>
                        </div>
                        <div class="delete-btn" onclick="deleteItem(${item.id})">✕</div>
                    `;
                    card.appendChild(itemEl);
                });
                
                section.appendChild(card);
                container.appendChild(section);
            }
        }

        function deleteItem(id) {
            historyData = historyData.filter(i => i.id !== id);
            saveAndRender();
        }

        function clearHistory() {
            if(confirm("確定要刪除所有紀錄嗎？")) {
                historyData = [];
                saveAndRender();
            }
        }

        saveAndRender();
    </script>
</body>
</html>
